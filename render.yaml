services:
  # 1. Express Backend Web Service
  - type: web
    name: elizion-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # 2. Vite React Static Frontend Service
  - type: web
    name: elizion-frontend
    runtime: static
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      # CRITICAL: Set to your deployed backend URL with /api suffix
      # Current value assumes backend service is named "elizion-backend"
      # Example: https://elizion-blog-backend.onrender.com/api
      # 
      # CUSTOM DOMAIN MIGRATION:
      # When you add a custom domain (e.g., www.yourdomain.com for frontend, api.yourdomain.com for backend):
      # 1. Update this value to: https://api.yourdomain.com/api
      # 2. Update server/server.js CORS allowedOrigins to include https://www.yourdomain.com
      # 3. Update server/server.js CORS allowedOrigins to include https://yourdomain.com
      - key: VITE_API_URL
        value: https://elizion-blog-backend.onrender.com/api
